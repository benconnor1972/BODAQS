services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      additional_contexts:
        analysis: ../analysis
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ../analysis:/app/analysis

  frontend:
    build:
      context: ./frontend
    ports:
      - target: 5173
        host_ip: 127.0.0.1
        published: 5173
        protocol: tcp
        mode: host
    environment:
      VITE_API_BASE: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
