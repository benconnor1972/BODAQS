services:
  api:
    build:
      context: ..
      dockerfile: webapp.bodaqs.net/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ../analysis:/app/analysis

  frontend:
    build:
      context: frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api
