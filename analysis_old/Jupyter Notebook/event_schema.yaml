version: "3"

# Global naming: columns are resolved as  <sensor_name><suffix>
naming:
  suffixes:
    disp: " [mm]"
    vel:  " [mm]_vel"
    acc:  " [mm]_acc" 
    disp_norm:  " [mm]_norm"

defaults:
  window: { pre_s: 2.0, post_s: 1.0, align: trigger }
  debounce:
    gap_s: 0.20          # default gap between candidates (in seconds)
    prefer_key: t0_index
    prefer_abs: false
    prefer_max: false
    
series:
  # system trigger / mark channel (boolean or 0/1)
  - id: "mark"
    kind: "trigger"
    source: "system:mark"
    column: "mark"
    edge: "rising"   # optional: rising|falling|both

events:
  - id: deep_compression
    label: "deep compression (0.8 <= disp_norm < 0.98)"
    # Can be one or many; resolution uses naming.suffixes for each listed sensor
    sensors: [rear_shock, front_shock]

    trigger:
      type: local_extrema
      signal: disp
      kind: max
      prominence: 5.0
      distance_s: 0.015
      edge_ignore_s: 1
      debounce:
          gap_s: 0.3          # same as old debounce_s
          prefer_key: disp   # which candidate field to score on
          prefer_abs: false    # score by abs(value) instead of signed
          prefer_max: true
      
    preconditions:
      - within_s: [-0.1, 0.1]
        all_of:
        - { type: peak, signal: disp_norm, kind: max, op: ">=", value: 0.8 }
        - { type: peak, signal: disp_norm, kind: max, op: "<", value: 0.98 }

    window: { pre_s: 0.2, post_s: 0.8, align: trigger }

    metrics:
     - type: peak
       signal: disp
       kind: max


    tags: [basic, kinematics]
 
  - id: rebounds
    label: "all rebound events >0.4"
    
    # Can be one or many; resolution uses naming.suffixes for each listed sensor
    sensors: [rear_shock, front_shock]

    trigger:
        id: "rebound_start"
        type: simple_threshold_crossing
        signal: "vel"
        value: 0.0                     # central threshold for the pattern (default 0.0)
        dir: falling
        hysteresis: 0
        distance_s: 0.015
        edge_ignore_s: 1
        debounce:
          gap_s: 0.3          # same as old debounce_s
          prefer_key: disp   # which candidate field to score on
          prefer_abs: false    # score by abs(value) instead of signed
          prefer_max: true
      
    secondary_triggers:
      - id: "rebound_end"
        type: simple_threshold_crossing
        signal: "vel"
        value: 0.0                     # central threshold for the pattern (default 0.0)

        base_trigger: "rebound_start"        # optional; if omitted, relative to frame start

        search:
          min_delay_s: 0.05            # start search this long after base_trigger
          max_delay_s: 0.8             # give up after this long
          direction: forward            # or backward / auto
          #smooth_ms: 0                # optional smoothing window
        dir: rising
        debounce:
          gap_s: 0.8          # same as old debounce_s
          prefer_key: t0_index   # which candidate field to score on
          prefer_abs: false    # score by abs(value) instead of signed
          prefer_max: false

    preconditions:
      - within_s: [-0.01, 0.01]
        any_of:
        - { type: peak, signal: disp_norm, kind: max, op: ">=", value: 0.25 }

    window: { pre_s: 0.2, post_s: 0.8, align: trigger }

    metrics:
      # Velocity stats between rebound_start and rebound_end
      - type: interval_stats
        signal: vel
        start_trigger: rebound_start     # defaults to primary if omitted
        end_trigger: rebound_end         # REQUIRED
        ops: [mean, max, min]            # any subset you like
        polarity: neg_to_pos             # affects how some ops behave (e.g. “peak”)
        smooth_ms: 20                    # optional, for this metric only
        min_delay_s: 0.02                # discard if end is too close to start
        return_debug: true               # optional: expose start/end times

      # Displacement change over the same interval
      - type: interval_stats
        signal: disp
        start_trigger: rebound_start
        end_trigger: rebound_end
        ops: [delta]                     # final - initial
    tags: [kinematics, rebound]