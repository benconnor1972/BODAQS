version: "1.0"
defaults:
  window: { pre_s: 2.0, post_s: 1.0, align: trigger }
  debounce_s: 0.25

events:
  - id: rear_bottom_out
    label: "Rear: Bottom-out (disp min)"
    sensor: rear_shock
    inputs:
      disp: rear_shock [mm]_zeroed
      vel:  rear_shock [mm]_zeroed_vel
      acc:  rear_shock [mm]_zeroed_acc
    trigger:
      type: local_extrema
      on: disp
      kind: min
      prominence: 3.0
      distance_s: 0.15
      edge_ignore_s: 0.05
    preconditions:
      - within_s: [-0.2, 0.0]
        any_of:
          - { type: range, on: vel, min: -200.0, max: 0.0 }
          - { type: peak,  on: vel, kind: min, op: "<=", value: -300.0 }
    debounce_s: 0.3
    window: { pre_s: 1.5, post_s: 0.8, align: trigger }
    metrics:
      - { type: peak, on: disp, kind: min, return_time: true }
      - { type: peak, on: vel,  kind: min, return_time: true }
      - { type: integral, on: acc, abs: true }
    tags: [basic, kinematics]

  - id: front_rebound_peak
    label: "Front: rebound velocity peak"
    sensor: front_shock
    inputs:
      disp: front_shock_mm_zeroed
      vel:  front_shock_mm_zeroed_vel
    trigger:
      type: local_extrema
      on: vel
      kind: max
      prominence: 500.0
      distance_s: 0.50
    window: { pre_s: 0.5, post_s: 0.5, align: "peak_on:vel" }
    metrics:
      - { type: peak, on: vel, kind: max, return_time: true }

  - id: harsh_landing
    label: "Harsh landing (acc threshold)"
    sensor: front_shock
    inputs:
      acc: front_shock_mm_zeroed_acc
      vel: front_shock_mm_zeroed_vel
    trigger:
      type: threshold_crossing
      on: acc
      dir: rising
      value: 15000.0
      hysteresis: 1000.0
    postconditions:
      - within_s: [0.0, 0.2]
        all_of:
          - { type: range, on: vel, min: -1000.0, max: 300.0 }
    debounce_s: 0.4
