version: "1.1"

# Global naming: columns are resolved as  <sensor_name><suffix>
naming:
  suffixes:
    disp: " [mm]"
    vel:  " [mm]_vel"
    acc:  " [mm]_acc"

defaults:
  window: { pre_s: 2.0, post_s: 1.0, align: trigger }
  debounce_s: 0.25

events:
  - id: deep_compression
    label: "deep compression (>135)"
    # Can be one or many; resolution uses naming.suffixes for each listed sensor
    sensors: [rear_shock, front_shock]

    # (Optional) You can omit 'inputs' entirely when using global suffixes.
    # Keeping this key makes the intent explicit and future-proof.
    inputs:
      mode: "suffixes"   # tells the resolver to use naming.suffixes

    trigger:
      type: local_extrema
      signal: disp
      kind: max
      prominence: 1.0
      distance_s: 1
      edge_ignore_s: 1

    preconditions:
      - within_s: [-0.1, 0.1]
        any_of:
        - { type: peak, signal: disp, kind: max, op: ">=", value: 135 }

    debounce_s: 0.3
    window: { pre_s: 0.5, post_s: 0.8, align: trigger }

    metrics:
      - { type: peak, signal: disp, kind: max, return_time: true }
      - { type: peak, signal: vel,  kind: max, return_time: true }
      - { type: integral, signal: acc, abs: true }

    tags: [basic, kinematics]
  - id: deep_compression_norm
    label: "deep compression (>0.8 norm)"
    # Can be one or many; resolution uses naming.suffixes for each listed sensor
    sensors: [rear_shock, front_shock]

    # (Optional) You can omit 'inputs' entirely when using global suffixes.
    # Keeping this key makes the intent explicit and future-proof.
    inputs:
      mode: "suffixes"   # tells the resolver to use naming.suffixes

    trigger:
      type: local_extrema
      signal: disp
      kind: max
      prominence: 1.0
      distance_s: 1
      edge_ignore_s: 1

    preconditions:
      - within_s: [-0.1, 0.1]
        any_of:
        - { type: peak, signal: disp, kind: max, op: ">=", value: 135 }

    debounce_s: 0.3
    window: { pre_s: 0.5, post_s: 0.8, align: trigger }

    metrics:
      - { type: peak, signal: disp, kind: max, return_time: true }
      - { type: peak, signal: vel,  kind: max, return_time: true }
      - { type: integral, signal: acc, abs: true }

    tags: [basic, kinematics]
