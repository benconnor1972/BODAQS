specification: 0.1.1
version: '5'
naming:
  suffixes:
    disp: ' [mm]'
    vel: ' _vel [mm/s]'
    acc: ' _acc [mm/s^2]'
defaults:
  window:
    pre_s: 2.0
    post_s: 1.0
    align: trigger
  debounce:
    gap_s: 0.2
    prefer_key: t0_index
    prefer_abs: false
    prefer_max: false
series:
- id: mark
  kind: trigger
  source: system:mark
  column: mark
  edge: rising
events:
- id: rebounds_all>25
  label: rebound events with max normalized displacement >0.25
  sensors:
    - rear_shock
    - front_shock
  trigger:
    id: rebound_start
    type: simple_threshold_crossing
    signal: vel
    value: 0.0
    dir: falling
    hysteresis: 0
    distance_s: 0.015
    edge_ignore_s: 1
    debounce:
      gap_s: 0.3
      prefer_key: disp
      prefer_abs: false
      prefer_max: true
  secondary_triggers:
  - id: rebound_end
    type: simple_threshold_crossing
    signal: vel
    value: 0.0
    base_trigger: rebound_start
    search:
      min_delay_s: 0.05
      max_delay_s: 0.8
      direction: forward
    dir: rising
    debounce:
      gap_s: 0.8
      prefer_key: t0_index
      prefer_abs: false
      prefer_max: false
  preconditions:
  - within_s:
    - -0.01
    - 0.01
    all_of:
    - type: peak
      signal: disp_norm
      kind: max
      cmp: '>'
      value: 0.25
  window:
    pre_s: 0.2
    post_s: 0.8
    align: trigger
  metrics:
    - type: interval_stats
      signal: vel
      start_trigger: rebound_start
      end_trigger: rebound_end
      ops:
      - mean
      - max
      - min
      polarity: neg_to_pos
      smooth_ms: 20
      min_delay_s: 0.02
      return_debug: true
    - type: peak
      signal: disp
      kind: max
    - type: peak
      signal: disp
      kind: min
  tags:
    - kinematics
    - rebound
  segment_defaults:
    anchor: trigger_time_s
    window:
      pre_s: 0.2
      post_s: 0.8
    roles:
      - role: disp
        prefer: &id001
          quantity: disp
          unit: mm
          op_chain: []
      - role: vel
        prefer: &id002
          quantity: vel
          unit: mm/s
          op_chain: []
      - role: acc
        prefer: &id003
          quantity: acc
          unit: mm/s^2
          op_chain: []
      - role: disp_norm
        prefer: &id004
          quantity: disp_norm
          unit: "1"
          op_chain: [norm]
- id: compressions_all>25
  label: all compression events >25% normalised displacement
  sensors:
    - rear_shock
    - front_shock
  trigger:
    id: compression_end
    type: simple_threshold_crossing
    signal: vel
    value: 0.0
    dir: falling
    hysteresis: 0
    distance_s: 0.015
    edge_ignore_s: 1
    debounce:
      gap_s: 0.3
      prefer_key: disp
      prefer_abs: false
      prefer_max: true
  secondary_triggers:
  - id: compression_start
    type: simple_threshold_crossing
    signal: vel
    value: 0.0
    base_trigger: compression_end
    search:
      min_delay_s: -0.8
      max_delay_s: -0.02
      direction: backward
    dir: rising
    debounce:
      gap_s: 0.02
      prefer_key: t0_index
      prefer_abs: false
      prefer_max: true
  preconditions:
  - within_s:
    - -0.01
    - 0.01
    all_of:
    - type: peak
      signal: disp_norm
      kind: max
      cmp: '>'
      value: 0.25
  window:
    pre_s: 0.8
    post_s: 0.2
    align: trigger
  metrics:
    - type: interval_stats
      signal: vel
      start_trigger: compression_start
      end_trigger: compression_end
      ops:
      - mean
      - max
      - min
      polarity: pos_to_neg
      smooth_ms: 20
      min_delay_s: 0.02
      return_debug: true
    - type: peak
      signal: disp
      kind: max
    - type: peak
      signal: disp
      kind: min
    - type: peak
      signal: acc
      kind: max
    - type: peak
      signal: acc
      kind: min
  tags:
    - kinematics
    - compression
  segment_defaults:
    anchor: trigger_time_s
    window:
      pre_s: 0.8
      post_s: 0.2
    roles:
      - role: disp
        prefer: *id001
      - role: vel
        prefer: *id002
      - role: acc
        prefer: *id003
      - role: disp_norm
        prefer: *id004
